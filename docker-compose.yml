services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    # Put real secrets into backend/.env on the server (NOT committed)
    env_file:
      - backend/.env
    restart: unless-stopped

  consumer_app:
    build:
      context: .
      dockerfile: consumer_app/Dockerfile
    ports:
      - "8001:8001"
    env_file:
      - consumer_app/.env
    depends_on:
      - backend
    restart: unless-stopped

