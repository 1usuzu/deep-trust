<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>{% block title %}DeepTrust.AI{% endblock %}</title>
    <meta name="description"
        content="{% block description %}DeepTrust.AI — Phát hiện Deepfake bằng AI & Xác thực{% endblock %}" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        :root {
            --bg: #f0f4f8;
            --surface: #fff;
            --surface2: #f8fafc;
            --border: rgba(15, 23, 42, .09);
            --primary: #2563eb;
            --primary-d: #1d4ed8;
            --success: #16a34a;
            --warn: #d97706;
            --danger: #dc2626;
            --purple: #7c3aed;
            --text: #0f172a;
            --muted: #475569;
            --dim: #94a3b8;
            --radius: 14px;
            --radius-sm: 9px;
            --sh-sm: 0 1px 3px rgba(0, 0, 0, .06), 0 1px 2px rgba(0, 0, 0, .04);
            --sh-md: 0 4px 16px rgba(0, 0, 0, .08), 0 2px 4px rgba(0, 0, 0, .05);
        }

        html {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6
        }

        body {
            min-height: 100vh
        }

        header {
            position: sticky;
            top: 0;
            z-index: 50;
            background: rgba(255, 255, 255, .9);
            backdrop-filter: blur(14px);
            border-bottom: 1px solid var(--border)
        }

        .hdr {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 24px;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 9px;
            font-size: 1.15rem;
            font-weight: 800;
            color: var(--text);
            text-decoration: none;
            letter-spacing: -.03em
        }

        .logo-icon {
            color: var(--primary);
            display: flex;
            align-items: center
        }

        .logo .accent {
            color: var(--primary)
        }

        .badge-tag {
            font-size: .68rem;
            font-weight: 700;
            letter-spacing: .07em;
            text-transform: uppercase;
            background: rgba(37, 99, 235, .1);
            color: var(--primary);
            border-radius: 999px;
            padding: 3px 10px
        }

        .hdr-right {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: .78rem;
            color: var(--muted)
        }

        .dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            display: inline-block
        }

        .dot-green {
            background: var(--success)
        }

        .dot-red {
            background: var(--danger)
        }

        .dot-warn {
            background: var(--warn)
        }

        .wrap {
            max-width: 1100px;
            margin: 0 auto;
            padding: 28px 24px 80px
        }

        .wrap-sm {
            max-width: 700px;
            margin: 0 auto;
            padding: 40px 24px 80px
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 24px 28px;
            box-shadow: var(--sh-sm);
            margin-bottom: 20px
        }

        .card-title {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: .95rem;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 20px
        }

        .card-title i {
            color: var(--primary)
        }

        .pill {
            display: inline-block;
            padding: 2px 9px;
            border-radius: 999px;
            font-size: .7rem;
            font-weight: 700
        }

        .pill-real {
            background: rgba(37, 99, 235, .1);
            color: var(--primary)
        }

        .pill-fake {
            background: rgba(220, 38, 38, .1);
            color: var(--danger)
        }

        .pill-approved {
            background: rgba(22, 163, 74, .1);
            color: var(--success)
        }

        .pill-review {
            background: rgba(217, 119, 6, .1);
            color: var(--warn)
        }

        .pill-rejected {
            background: rgba(220, 38, 38, .1);
            color: var(--danger)
        }

        .pill-low {
            background: rgba(22, 163, 74, .1);
            color: var(--success)
        }

        .pill-medium {
            background: rgba(217, 119, 6, .1);
            color: var(--warn)
        }

        .pill-high {
            background: rgba(220, 38, 38, .1);
            color: var(--danger)
        }

        .pill-critical {
            background: rgba(124, 58, 237, .12);
            color: var(--purple)
        }

        .pill-unknown {
            background: var(--bg);
            color: var(--dim)
        }

        .decision-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 5px 16px;
            border-radius: 999px;
            font-size: .85rem;
            font-weight: 700
        }

        .db-approved {
            background: rgba(22, 163, 74, .1);
            color: var(--success)
        }

        .db-review {
            background: rgba(217, 119, 6, .1);
            color: var(--warn)
        }

        .db-rejected {
            background: rgba(220, 38, 38, .1);
            color: var(--danger)
        }

        .bar-wrap {
            margin-top: 5px;
            height: 5px;
            background: var(--border);
            border-radius: 99px;
            overflow: hidden
        }

        .bar-fill {
            height: 100%;
            border-radius: 99px;
            transition: width .5s ease
        }

        .bf-green {
            background: var(--success)
        }

        .bf-red {
            background: var(--danger)
        }

        .reason-note {
            display: flex;
            align-items: flex-start;
            gap: 7px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 10px 13px;
            margin-top: 10px;
            font-size: .85rem;
            color: var(--muted)
        }

        .hash-box {
            font-family: 'ui-monospace', monospace;
            font-size: .76rem;
            color: var(--muted);
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 9px 13px;
            word-break: break-all;
            margin-top: 10px
        }

        .hash-box .h-lbl {
            font-size: .65rem;
            text-transform: uppercase;
            letter-spacing: .05em;
            color: var(--dim);
            margin-bottom: 2px
        }

        .empty-state {
            text-align: center;
            padding: 36px 0;
            color: var(--dim);
            font-size: .88rem
        }

        @keyframes spin {
            to {
                transform: rotate(360deg)
            }
        }

        @media(max-width:600px) {
            .hdr-right {
                display: none
            }
        }
    </style>
    {% block extra_styles %}{% endblock %}
</head>

<body>
    {% block header %}
    <header>
        <div class="hdr">
            <a href="/" class="logo">
                <span class="logo-icon"><i data-lucide="shield" width="20" height="20"></i></span>
                DeepTrust<span class="accent">.AI</span>
                {% block logo_badge %}<span class="badge-tag">Consumer Portal</span>{% endblock %}
            </a>
            {% block header_right %}{% endblock %}
        </div>
    </header>
    {% endblock %}

    {% block body %}{% endblock %}

    <script>lucide.createIcons();</script>
    {% block extra_scripts %}{% endblock %}
</body>

</html>
